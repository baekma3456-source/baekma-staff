<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>백마마을 통합재건축 — 주민대표단</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:13px;color:#1a1a1a;background:#e8eaef;display:flex;justify-content:center;min-height:100vh;}
.phone{width:100%;max-width:400px;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;position:relative;}

/* ══ LOGIN ══ */
#screen-login{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;background:linear-gradient(165deg,#152d4a 0%,#1e3a5f 50%,#2d5a8e 100%);padding:40px 28px;position:relative;overflow:hidden;}
#screen-login::before{content:'';position:absolute;top:-100px;right:-80px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.04);}
#screen-login::after{content:'';position:absolute;bottom:-80px;left:-60px;width:240px;height:240px;border-radius:50%;background:rgba(74,144,217,0.09);}
.login-inner{width:100%;max-width:340px;position:relative;z-index:1;}
.login-header{text-align:center;margin-bottom:36px;}
.login-emblem{width:62px;height:62px;border-radius:16px;margin:0 auto 14px;background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:26px;}
.login-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;margin-bottom:3px;}
.login-sub{font-size:11px;color:rgba(255,255,255,0.48);letter-spacing:0.5px;}
.login-card{background:rgba(255,255,255,0.97);border-radius:18px;padding:26px 22px;box-shadow:0 12px 40px rgba(0,0,0,0.22);}
.f-label{font-size:10px;font-weight:500;color:#4a5568;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;display:block;}
.f-group{margin-bottom:15px;}
.f-input{width:100%;padding:12px 14px;font-size:13px;font-family:inherit;border:1.5px solid #d8dfe8;border-radius:10px;background:#fff;color:#1a1a1a;outline:none;transition:border-color .2s,box-shadow .2s;}
.f-input:focus{border-color:#2d5a8e;box-shadow:0 0 0 3px rgba(45,90,142,0.10);}
.f-input::placeholder{color:#b0bec5;}
.login-btn{width:100%;padding:13px;font-size:14px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:#fff;border:none;border-radius:10px;cursor:pointer;letter-spacing:0.2px;box-shadow:0 4px 14px rgba(30,58,95,0.30);transition:opacity .15s,transform .1s;}
.login-btn:active{transform:scale(0.98);opacity:0.92;}
.login-btn:disabled{opacity:0.6;cursor:not-allowed;}
.login-err{display:none;margin-top:10px;padding:9px 12px;background:#FDECEA;border-radius:8px;font-size:11px;color:#c62828;text-align:center;}
.login-err.show{display:block;}
.login-footer{margin-top:22px;text-align:center;font-size:10px;color:rgba(255,255,255,0.38);line-height:1.8;}

/* ══ MAIN ══ */
#screen-main{flex:1;display:none;flex-direction:column;}
.topbar{background:#1e3a5f;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.t-main{color:#fff;font-size:12px;font-weight:500;}
.t-user{display:flex;align-items:center;gap:6px;}
.t-badge{background:#2d5a8e;color:#B5D4F4;font-size:10px;padding:1px 7px;border-radius:10px;}
.t-name{color:#a0b8d0;font-size:11px;}
.t-logout{font-size:10px;color:rgba(255,255,255,0.45);padding:3px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:5px;background:transparent;cursor:pointer;font-family:inherit;}
.t-pwbtn{font-size:10px;color:rgba(255,255,255,0.45);padding:3px 8px;border:1px solid rgba(255,255,255,0.15);border-radius:5px;background:transparent;cursor:pointer;font-family:inherit;margin-right:4px;}
.tabs{background:#e8eaef;display:flex;border-bottom:0.5px solid #d0d4db;flex-shrink:0;}
.tab{padding:9px 0;font-size:11px;color:#666;flex:1;text-align:center;cursor:pointer;}
.tab.on{background:#1e3a5f;color:#fff;font-weight:500;}
.tab-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tab-panel{display:none;padding:10px;flex-direction:column;gap:10px;}
.tab-panel.active{display:flex;}

/* ══ 공통 ══ */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:10px;}
.spinner{width:28px;height:28px;border:3px solid #d0d4db;border-top-color:#1e3a5f;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:#888;}
.empty-msg{text-align:center;padding:24px;font-size:11px;color:#888;}

/* ══ TAB 0: 종합 ══ */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.kpi-card{background:#fff;border:0.5px solid #d0d4db;border-radius:8px;padding:10px 12px;}
.kpi-lbl{font-size:10px;color:#666;margin-bottom:4px;}
.kpi-val{font-size:20px;font-weight:500;color:#1e3a5f;}
.kpi-sub{font-size:10px;color:#666;margin-top:2px;}
.kpi-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.kpi-lbl2{font-size:10px;color:#666;}
.dd-sm{padding:2px 6px;font-size:10px;border:0.5px solid rgba(0,0,0,0.25);border-radius:4px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.kpi-pct{font-size:22px;font-weight:500;color:#3B6D11;}
.kpi-sub2{font-size:10px;color:#666;margin-top:2px;}
.pct-track{height:6px;background:#f0f0f0;border-radius:3px;margin-top:6px;overflow:hidden;}
.pct-fill{height:100%;background:#3B6D11;border-radius:3px;transition:width .3s;}
.section-card{background:#fff;border:0.5px solid #d0d4db;border-radius:8px;padding:10px 12px;}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.section-title{font-size:12px;font-weight:500;}
.dd-select{padding:4px 8px;font-size:11px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.section-sub{font-size:10px;color:#666;margin-bottom:10px;}
.bar-block{margin-bottom:10px;}.bar-block:last-child{margin-bottom:0;}
.bar-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px;}
.bar-dong{font-size:11px;font-weight:500;}.bar-pct{font-size:11px;font-weight:500;color:#3B6D11;}
.bar-track{height:8px;background:#f0f0f0;border-radius:4px;display:flex;overflow:hidden;}
.bs{background:#3B6D11;height:100%;}.bo{background:#E24B4A;height:100%;}.bn{background:#e8e8e8;height:100%;}
.bar-ft{display:flex;gap:8px;margin-top:3px;}
.leg{display:flex;align-items:center;gap:3px;font-size:10px;color:#666;}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.dy{background:#3B6D11;}.dn{background:#E24B4A;}.dg{background:#ccc;}

/* ══ TAB 1: 소유주 조회 ══ */
.filter-row{display:flex;gap:6px;}
.filter-row select{flex:1;padding:5px 6px;font-size:11px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.search-row{display:flex;gap:6px;}
.search-row input{flex:1;padding:7px 10px;font-size:12px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#1a1a1a;outline:none;font-family:inherit;}
.search-row input:focus{border-color:#1e3a5f;}
.search-row button{padding:7px 12px;font-size:11px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;white-space:nowrap;}
.meta-row{display:flex;justify-content:space-between;align-items:center;}
.cnt{font-size:10px;color:#666;}.hint{font-size:10px;color:#888;font-style:italic;}
.cards{display:flex;flex-direction:column;gap:8px;}
.ocard{background:#fff;border:0.5px solid #d0d4db;border-radius:8px;padding:10px 12px;cursor:pointer;user-select:none;}
.ocard:active{background:#f5f8ff;}
.yn-line{font-size:11px;color:#666;margin-bottom:4px;}
.yn-num{font-size:13px;font-weight:700;color:#1e3a5f;}
.info-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.info-name{font-size:13px;font-weight:500;}
.info-pay-y{font-size:11px;font-weight:500;color:#27500A;}
.info-pay-n{font-size:11px;font-weight:500;color:#A32D2D;}
.info-row2{display:flex;align-items:center;justify-content:space-between;}
.info-tel{font-size:11px;color:#666;}.info-notel{font-size:11px;color:#888;font-style:italic;}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;}
.tag-res-y{background:#E6F1FB;color:#0C447C;}
.tag-res-n{background:#F1EFE8;color:#5F5E5A;}
.badge-joint{font-size:10px;padding:1px 7px;border-radius:10px;background:#FAEEDA;color:#633806;margin-left:6px;}
.divider{height:0.5px;background:#d0d4db;margin:8px 0;}
.consent-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:3px;text-align:center;}
.c-col{display:flex;flex-direction:column;align-items:center;gap:2px;}
.c-lbl{font-size:8px;color:#666;font-weight:500;line-height:1.3;}
.c-val{font-size:11px;font-weight:500;padding:2px 0;border-radius:3px;width:100%;text-align:center;}
.c-y{background:#EAF3DE;color:#27500A;}.c-n{background:#FCEBEB;color:#791F1F;}.c-dash{background:#F1EFE8;color:#888780;}

/* ══ TAB 2: 활동 기록 ══ */
.list-header{display:flex;align-items:center;justify-content:space-between;}
.list-lbl{font-size:12px;font-weight:500;}
.new-btn{padding:5px 12px;font-size:11px;background:#1e3a5f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;}
.act-card{background:#fff;border:0.5px solid #d0d4db;border-radius:8px;padding:10px 12px;}
.act-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.act-left{display:flex;align-items:center;gap:6px;}
.act-type-badge{font-size:11px;font-weight:500;background:#E6F1FB;color:#0C447C;padding:1px 7px;border-radius:4px;}
.act-who{font-size:11px;color:#666;}
.act-time{font-size:10px;color:#888;}
.act-target{font-size:12px;font-weight:500;margin-bottom:3px;}
.act-target span{font-size:11px;font-weight:400;color:#666;margin-left:4px;}
.act-content{font-size:11px;color:#666;margin-bottom:5px;}
.act-result{font-size:10px;padding:1px 8px;border-radius:4px;display:inline-block;}
.res-submit{background:#EAF3DE;color:#27500A;}
.res-retry{background:#FFF3CD;color:#856404;}
.res-refuse{background:#FCEBEB;color:#791F1F;}
.res-absent{background:#F1EFE8;color:#5F5E5A;}
.res-etc{background:#F0F0F0;color:#555;}

/* ══ 새 기록 오버레이 ══ */
.form-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.form-overlay.show{display:flex;}
.form-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:400px;max-height:90vh;overflow-y:auto;padding:16px 14px 28px;}
.form-title{font-size:14px;font-weight:700;color:#1e3a5f;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.form-close{font-size:20px;color:#888;cursor:pointer;line-height:1;}
.form-auto{display:flex;gap:8px;margin-bottom:14px;}
.auto-item{flex:1;background:#f5f7fa;border-radius:6px;padding:6px 8px;}
.auto-lbl{font-size:9px;color:#888;margin-bottom:2px;}
.auto-val{font-size:11px;font-weight:500;color:#1e3a5f;}
.form-section{margin-bottom:14px;}
.form-lbl{font-size:11px;font-weight:500;color:#444;margin-bottom:6px;}
.act-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.act-type-grid .atype-btn:nth-child(4){grid-column:1;}
.act-type-grid .atype-btn:nth-child(5){grid-column:2/span 2;}
.atype-btn{padding:7px 4px;font-size:11px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#666;cursor:pointer;text-align:center;font-family:inherit;}
.atype-btn.sel{border-color:#1e3a5f;background:#E6F1FB;color:#1e3a5f;font-weight:500;}
.owner-search{width:100%;padding:8px 10px;font-size:12px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.owner-search:focus{border-color:#1e3a5f;}
.search-result{border:0.5px solid #d0d4db;border-radius:6px;background:#fff;margin-top:4px;max-height:160px;overflow-y:auto;display:none;}
.search-item{padding:8px 10px;font-size:12px;border-bottom:0.5px solid #f0f0f0;cursor:pointer;}
.search-item:last-child{border-bottom:none;}
.search-item:active{background:#E6F1FB;}
.search-item.sel{background:#E6F1FB;color:#0C447C;font-weight:500;}
.selected-owner-box{margin-top:6px;padding:8px 10px;background:#E6F1FB;border-radius:6px;font-size:12px;color:#0C447C;display:none;}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.result-grid .result-btn:last-child:nth-child(odd){grid-column:span 2;}
.result-btn{padding:8px 4px;font-size:11px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;background:#fff;color:#666;cursor:pointer;text-align:center;font-family:inherit;}
.result-btn.sel{border-color:#1e3a5f;background:#E6F1FB;color:#1e3a5f;font-weight:500;}
.memo-area{width:100%;padding:8px;font-size:11px;border:0.5px solid rgba(0,0,0,0.25);border-radius:6px;resize:none;height:68px;background:#fff;color:#1a1a1a;font-family:inherit;outline:none;}
.memo-area:focus{border-color:#1e3a5f;}
.submit-btn{width:100%;padding:9px;font-size:12px;font-weight:500;background:#1e3a5f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

/* ══ 소유주 상세 팝업 ══ */
.popup-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;}
.popup-overlay.show{display:flex;}
.popup{background:#fff;border-radius:16px;width:calc(100% - 24px);max-width:400px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;}
.popup-header{background:#1e3a5f;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.popup-title{color:#fff;font-size:12px;font-weight:500;}
.popup-close{color:#a0b8d0;font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
.popup-tabs{display:flex;border-bottom:0.5px solid #d0d4db;background:#f5f7fa;}
.ptab{flex:1;padding:8px 4px;font-size:11px;color:#666;text-align:center;cursor:pointer;border-bottom:2px solid transparent;}
.ptab.on{color:#1e3a5f;border-bottom-color:#1e3a5f;font-weight:500;}
.popup-body{padding:12px;overflow-y:auto;flex:1;}
.pane{display:none;}.pane.on{display:block;}
.section-lbl{font-size:10px;font-weight:500;color:#666;background:#f5f7fa;padding:4px 8px;border-radius:4px;margin:10px 0 6px;}
.section-lbl:first-child{margin-top:0;}
.field-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid #d0d4db;font-size:12px;}
.field-row:last-child{border-bottom:none;}
.field-key{color:#666;flex-shrink:0;margin-right:8px;}
.field-val{font-weight:500;text-align:right;word-break:break-all;}
.consent-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #d0d4db;font-size:12px;}
.consent-item:last-child{border-bottom:none;}
.badge-o{background:#EAF3DE;color:#27500A;font-size:11px;padding:2px 10px;border-radius:4px;font-weight:500;}
.badge-x{background:#FCEBEB;color:#791F1F;font-size:11px;padding:2px 10px;border-radius:4px;}
.badge-op{background:#FAEEDA;color:#633806;font-size:11px;padding:2px 10px;border-radius:4px;}
.badge-dash{background:#F1EFE8;color:#888780;font-size:11px;padding:2px 10px;border-radius:4px;}
.pay-total{background:#E6F1FB;border-radius:6px;padding:10px 12px;margin-bottom:12px;}
.pay-total-lbl{font-size:10px;color:#0C447C;}.pay-total-val{font-size:18px;font-weight:500;color:#0C447C;margin-top:2px;}
.pay-item{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid #d0d4db;font-size:12px;}
.pay-item:last-child{border-bottom:none;}
.act-mini-item{padding:8px 0;border-bottom:0.5px solid #d0d4db;font-size:12px;}
.act-mini-item:last-child{border-bottom:none;}
.act-mini-top{display:flex;justify-content:space-between;margin-bottom:2px;}
.act-mini-result{font-size:10px;padding:1px 7px;border-radius:4px;display:inline-block;margin-top:3px;}

/* ══ 비밀번호 변경 모달 ══ */
.pw-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:none;align-items:center;justify-content:center;}
.pw-modal-overlay.show{display:flex;}
.pw-modal{background:#fff;border-radius:16px;padding:24px 20px;width:calc(100% - 48px);max-width:340px;}
.pw-modal-title{font-size:15px;font-weight:700;color:#1e3a5f;margin-bottom:4px;}
.pw-modal-sub{font-size:11px;color:#888;margin-bottom:18px;}
.pw-field{margin-bottom:12px;}
.pw-field label{font-size:10px;font-weight:500;color:#4a5568;text-transform:uppercase;letter-spacing:0.6px;display:block;margin-bottom:5px;}
.pw-field input{width:100%;padding:11px 13px;font-size:13px;font-family:inherit;border:1.5px solid #d8dfe8;border-radius:10px;outline:none;transition:border-color .2s;}
.pw-field input:focus{border-color:#2d5a8e;}
.pw-msg{display:none;margin-bottom:12px;padding:9px 12px;border-radius:8px;font-size:11px;text-align:center;}
.pw-msg.err{display:block;background:#FDECEA;color:#c62828;}
.pw-msg.ok{display:block;background:#E8F5E9;color:#2E7D32;}
.pw-btns{display:flex;gap:8px;margin-top:4px;}
.pw-btn-cancel{flex:1;padding:11px;font-size:13px;font-family:inherit;background:#f0f2f5;color:#555;border:none;border-radius:10px;cursor:pointer;}
.pw-btn-save{flex:2;padding:11px;font-size:13px;font-weight:700;font-family:inherit;background:linear-gradient(135deg,#1e3a5f,#2d5a8e);color:#fff;border:none;border-radius:10px;cursor:pointer;}
.pw-btn-save:disabled{opacity:0.6;cursor:not-allowed;}
</style>
</head>
<body>
<div class="phone">

<!-- 로그인 -->
<div id="screen-login">
  <div class="login-inner">
    <div class="login-header">
      <div class="login-emblem">🏗</div>
      <div class="login-title">백마마을 통합재건축</div>
      <div class="login-sub">주민대표단 전용 앱</div>
    </div>
    <div class="login-card">
      <div class="f-group">
        <label class="f-label" for="inp-id">이메일</label>
        <input class="f-input" id="inp-id" type="email" placeholder="이메일 입력" autocomplete="email" inputmode="email">
      </div>
      <div class="f-group">
        <label class="f-label" for="inp-pw">비밀번호</label>
        <input class="f-input" id="inp-pw" type="password" placeholder="비밀번호 입력">
      </div>
      <button class="login-btn" id="login-btn">로그인</button>
      <div class="login-err" id="login-err">이메일 또는 비밀번호가 올바르지 않습니다.</div>
    </div>
    <div class="login-footer">계정 문의: 위원장 직통</div>
  </div>
</div>

<!-- 메인 -->
<div id="screen-main">
  <div class="topbar">
    <span class="t-main">백마마을 통합재건축</span>
    <div class="t-user">

function getDanjiKey(부동산코드) {
  if (!부동산코드) return '';
  const s = String(부동산코드);
  const shopPrefixes = ['3SS','4SS','4DS','5SS','5DS','6SS','BMS','SCS'];
  for (const p of shopPrefixes) { if (s.startsWith(p)) return 's'; }
  const d = parseInt(s.split('-')[0]);
  if (d >= 300 && d < 400) return '3';
  if (d >= 400 && d < 500) return '4';
  if (d >= 500 && d < 600) return '5';
  if (d >= 600 && d < 700) return '6';
  return '';
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Supabase REST API 직접 호출 (페이지네이션용)
async function sbGet(path) {
  const sess = (await _supabase.auth.getSession()).data.session;
  const headers = {
    'apikey': SB_KEY,
    'Authorization': sess ? `Bearer ${sess.access_token}` : `Bearer ${SB_KEY}`,
    'Content-Type': 'application/json'
  };
  const r = await fetch(SB_URL + '/rest/v1/' + path, { headers });
  if (!r.ok) return [];
  return await r.json();
}

// 전체 데이터 로드 — range 페이지네이션으로 1000건 제한 우회
async function fetchAll(table, selectCols, filter = null) {
  const PAGE = 1000;
  let all = [], from = 0;
  while (true) {
    let q = _supabase.from(table).select(selectCols).range(from, from + PAGE - 1);
    if (filter) q = filter(q);
    const { data, error } = await q;
    if (error || !data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < PAGE) break;
    from += PAGE;
  }
  return all;
}

async function sbGetAll(path, pageSize=1000) {
  let all = [], offset = 0;
  while (true) {
    const sep = path.includes('?') ? '&' : '?';
    const rows = await sbGet(path + sep + 'limit=' + pageSize + '&offset=' + offset);
    if (!rows || rows.length === 0) break;
    all = all.concat(rows);
    if (rows.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pw });

  if (error || !data.user) {
    errEl.classList.add('show');
    btn.disabled = false; btn.textContent = '로그인';
    return;
  }

  const { data: userRow } = await _supabase
    .from('app_user').select('*').eq('username', data.user.email).single();

  if (!userRow || !userRow.is_active) {
    errEl.textContent = '비활성화된 계정이거나 등록되지 않은 계정입니다.';
    errEl.classList.add('show');
    await _supabase.auth.signOut();
    btn.disabled = false; btn.textContent = '로그인';

  currentUser = userRow;
  await initMain();
  btn.disabled = false; btn.textContent = '로그인';
}

// ════════════════════════════════════════════════
let allYeonbunProperty = []; // 전체 yeonbun_property (부동산코드 → 연번)
let allProperty        = []; // 전체 property (부동산코드, 동)
let propCodeToYn       = {}; // 부동산코드 → 연번
let propCodeToDong     = {}; // 부동산코드 → 동
let ynToDongs          = {}; // 연번 → [동, ...]

async function loadSummaryData() {
  document.getElementById('bars-wrap').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span class="loading-txt">데이터 불러오는 중...</span></div>';

  // 3개 테이블 병렬 로드 (consent 전체 로드 제거 — 집계 쿼리로 대체)
  [allYeonbun, allYeonbunProperty, allProperty] = await Promise.all([
    fetchAll('yeonbun', '연번', q => q.eq('is_active', true)),
    fetchAll('yeonbun_property', '부동산코드,연번'),
    fetchAll('property', '부동산코드,동'),
  ]);

  // 인덱스 구성
  allYeonbunProperty.forEach(r => { propCodeToYn[r['부동산코드']] = r['연번']; });
  allProperty.forEach(r => { propCodeToDong[r['부동산코드']] = r['동']; });

  // 연번 → 동 목록 매핑
  allYeonbunProperty.forEach(r => {
    const yn = r['연번'];
    const dong = propCodeToDong[r['부동산코드']];
    if (!dong) return;
    if (!ynToDongs[yn]) ynToDongs[yn] = new Set();
    ynToDongs[yn].add(dong);
  });

  document.getElementById('kpi-total').textContent = allYeonbun.length.toLocaleString();

  renderSummary();
  document.getElementById('kpi-sel').addEventListener('change', renderSummary);
  document.getElementById('danji-sel-summary').addEventListener('change', renderDanjiBars);
}

async function renderSummary() {
  const 차수 = parseInt(document.getElementById('kpi-sel').value);
  const total = allYeonbun.length;
  const activeSet = new Set(allYeonbun.map(y => y['연번']));

  // DB에서 해당 차수 제출/반대 연번만 조회 (전체 consent 로드 불필요)
  const { data: submitRows } = await _supabase
    .from('consent').select('연번').eq('차수', 차수).eq('상태', '제출');
  const { data: opposeRows } = await _supabase
    .from('consent').select('연번').eq('차수', 차수).eq('상태', '반대');

  consentCache[차수] = {
    submitSet: new Set((submitRows || []).map(r => r['연번']).filter(yn => activeSet.has(yn))),
    opposeSet: new Set((opposeRows || []).map(r => r['연번']).filter(yn => activeSet.has(yn))),
  };

  const submitted = consentCache[차수].submitSet.size;
  const pct = total ? (submitted / total * 100).toFixed(1) : 0;

  document.getElementById('kpi-pct').textContent = pct + '%';
  document.getElementById('kpi-sub').textContent = `${submitted.toLocaleString()} / ${total.toLocaleString()} 연번`;
  document.getElementById('kpi-bar').style.width = pct + '%';
  document.getElementById('consent-label').textContent = CONSENT_NAMES[차수] + ' · 단지별 현황';
  renderDanjiBars();
}

function renderDanjiBars() {
  const 차수 = parseInt(document.getElementById('kpi-sel').value);
  const danjiKey = document.getElementById('danji-sel-summary').value;
  const dongs = DANJI_DONG[danjiKey] || [];
  const wrap = document.getElementById('bars-wrap');

  // consentCache에서 가져옴 (renderSummary에서 이미 로드됨)
  const cache = consentCache[차수] || { submitSet: new Set(), opposeSet: new Set() };
  const submitSet = cache.submitSet;
  const opposeSet = cache.opposeSet;
  const activeSet = new Set(allYeonbun.map(y => y['연번']));

  // 캐시된 데이터로만 계산 — DB 조회 없음
  const dongMap = {};
  dongs.forEach(dong => { dongMap[dong] = {total:0, submit:0, oppose:0}; });

  activeSet.forEach(yn => {
    const dongSet = ynToDongs[yn];
    if (!dongSet) return;
    dongSet.forEach(dong => {
      if (!dongMap[dong]) return;
      dongMap[dong].total++;
      if (submitSet.has(yn)) dongMap[dong].submit++;
      else if (opposeSet.has(yn)) dongMap[dong].oppose++;
    });
  });

  if (dongs.every(d => dongMap[d].total === 0)) {
    wrap.innerHTML = '<div class="empty-msg">데이터 없음</div>';
    return;
  }

  wrap.innerHTML = dongs.map(dong => {
    const d = dongMap[dong];
    if (d.total === 0) return '';
    const sp = (d.submit / d.total * 100).toFixed(1);
    const op = (d.oppose / d.total * 100).toFixed(1);
    const np = Math.max(0, 100 - parseFloat(sp) - parseFloat(op)).toFixed(1);
    return `
      <div class="bar-block">
        <div class="bar-header">
          <span class="bar-dong">${dong}</span>
          <span class="bar-pct">${sp}%</span>
        </div>
        <div class="bar-track">
          <div class="bs" style="width:${sp}%"></div>
          <div class="bo" style="width:${op}%"></div>
          <div class="bn" style="width:${np}%"></div>
        </div>
        <div class="bar-ft">
          <span class="leg"><span class="dot dy"></span>제출 ${d.submit}</span>
          <span class="leg"><span class="dot dn"></span>반대 ${d.oppose}</span>
          <span class="leg"><span class="dot dg"></span>미제출 ${d.total - d.submit - d.oppose}</span>
          <span class="leg" style="margin-left:auto;color:#444">전체 ${d.total}</span>
        </div>
      </div>`;
  }).join('');
}

async function loadLookup() {
  const dong = document.getElementById('dong-sel-lookup').value;
  const nameKw = document.getElementById('name-search-input').value.trim();
  const wrap = document.getElementById('cards-wrap');

  wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span class="loading-txt">불러오는 중...</span></div>';

  try {
    // 1단계: 해당 동의 부동산 목록 (부동산코드 기준 — 카드 1개 = 부동산 1채)
    const { data: propRows } = await _supabase
      .from('property')
      .select('부동산코드, 동, 호, 전유면적')
      .eq('동', dong)
      .order('호', { ascending: false });

    if (!propRows || propRows.length === 0) {
      wrap.innerHTML = '<div class="empty-msg">부동산 정보 없음</div>';
      document.getElementById('cnt-lbl').textContent = '0건 표시';
      return;
    }

    const propCodes = propRows.map(r => r['부동산코드']);
    const propMap = {};
    propRows.forEach(p => { propMap[p['부동산코드']] = p; });

    // 2단계: 부동산코드 → 연번 매핑 (50개씩 청크 — 병렬)
    const pidToYn = {};
    const ypChunks = [];
    for (let i = 0; i < propCodes.length; i += 50)
      ypChunks.push(propCodes.slice(i, i + 50));
    const ypResults = await Promise.all(
      ypChunks.map(chunk =>
        _supabase.from('yeonbun_property').select('부동산코드, 연번').in('부동산코드', chunk)
      )
    );
    ypResults.forEach(({ data }) =>
      (data || []).forEach(r => { pidToYn[r['부동산코드']] = r['연번']; })
    );

    // 연번 목록
    const ynNums = [...new Set(Object.values(pidToYn))];

    // 3단계: 연번 기준 소유주·동의·납부 조회 (100개씩 청크 — 병렬)
    const yoAll = [], cAll = [], pAll = [];
    const ynChunks = [];
    for (let i = 0; i < ynNums.length; i += 100)
      ynChunks.push(ynNums.slice(i, i + 100));
    const ynResults = await Promise.all(
      ynChunks.map(chunk => Promise.all([
        _supabase.from('yeonbun_owner')
          .select('연번, 부번, 대표소유주, owner:owner_id(id, 이름, 전화번호, 거주구분)')
          .in('연번', chunk),
        _supabase.from('consent').select('연번, 차수, 상태').in('연번', chunk),
        _supabase.from('payment').select('연번').in('연번', chunk),
      ]))
    );
    ynResults.forEach(([yoR, cR, pR]) => {
      yoAll.push(...(yoR.data || []));
      cAll.push(...(cR.data || []));
      pAll.push(...(pR.data || []));
    });

    // 연번별 대표소유주 (없으면 부번 최솟값 fallback)
    const repMap = {};
    const ynOwnerRows = {};
    yoAll.forEach(r => {
      const yn = r['연번'];
      if (!ynOwnerRows[yn]) ynOwnerRows[yn] = [];
      ynOwnerRows[yn].push(r);
    });
    Object.entries(ynOwnerRows).forEach(([yn, rows]) => {
      const uniqueOwners = new Set(rows.map(r => r.owner?.id)).size;
      const rep = rows.find(r => r['대표소유주'])
        || rows.sort((a,b) => (a['부번']||0) - (b['부번']||0))[0];
      if (rep) repMap[yn] = {
        이름: rep.owner?.이름 || '—',
        전화번호: rep.owner?.전화번호 || '',
        거주구분: rep.owner?.거주구분 || '',
        owner_id: rep.owner?.id,
        소유형태: uniqueOwners > 1 ? '공동' : '단독',
        공동인원: uniqueOwners,
      };
    });

    // 연번별 총 부동산 수
    const ynPropCount = {};
    allYeonbunProperty.forEach(r => {
      ynPropCount[r['연번']] = (ynPropCount[r['연번']] || 0) + 1;
    });

    const consentMap = {};
    cAll.forEach(r => {
      if (!consentMap[r['연번']]) consentMap[r['연번']] = {};
      consentMap[r['연번']][r['차수']] = r['상태'];
    });

    const paySet = new Set(pAll.map(r => r['연번']));

    // 이름 필터
    let filtered = propCodes.filter(pid => {
      const yn = pidToYn[pid];
      if (!yn) return false;
      if (!nameKw) return true;
      return repMap[yn]?.이름?.includes(nameKw);
    });

    document.getElementById('cnt-lbl').textContent = `${filtered.length}건 표시`;

    if (filtered.length === 0) {
      wrap.innerHTML = '<div class="empty-msg">검색 결과 없음</div>';
      return;
    }

    // 호수 숫자 기준 내림차순 정렬
    filtered.sort((a, b) => {
      const hoA = parseInt((propMap[a]?.호 || '0').replace(/\D/g, '')) || 0;
      const hoB = parseInt((propMap[b]?.호 || '0').replace(/\D/g, '')) || 0;
      return hoB - hoA;
    });

    wrap.innerHTML = filtered.map(pid => {
      const yn = pidToYn[pid];
      const prop = propMap[pid] || {};
      const rep = repMap[yn] || {};
      const cm = consentMap[yn] || {};
      const paid = paySet.has(yn);
      const propCount = ynPropCount[yn] || 1;

      function cval(차수) {
        const s = cm[차수];
        if (s === '제출') return `<div class="c-val c-y">○</div>`;
        if (s === '반대') return `<div class="c-val c-n">✕</div>`;
        return `<div class="c-val c-dash">—</div>`;
      }

      return `
        <div class="ocard" onclick="openPopup(${yn})">
          <div class="yn-line" style="display:flex;align-items:center;justify-content:space-between">
            <span style="font-weight:600">${esc(pid)}</span>
            <span style="display:flex;align-items:center;gap:5px">
              <span class="tag ${rep.소유형태==='공동'?'badge-joint':'tag-res-y'}" style="font-size:10px;padding:1px 7px">${rep.소유형태||'단독'}</span>
              ${propCount > 1 ? `<span style="font-size:10px;font-weight:600;color:#8B2FC9;background:#F3E8FF;padding:1px 7px;border-radius:4px">다주택</span>` : ''}
              <span style="font-size:10px;color:#999">연번 <strong style="color:#1e3a5f">${yn}</strong></span>
            </span>
          </div>
          <div class="info-row">
            <span class="info-name">${esc(rep.이름||'—')}${rep.소유형태==='공동'?`<span class="badge-joint" style="margin-left:5px;font-size:10px">외 ${rep.공동인원-1}명</span>`:''}</span>
            <span class="${paid?'info-pay-y':'info-pay-n'}">${paid?'납부':'미납'}</span>
          </div>
          <div class="info-row2">
            ${rep.전화번호
              ? `<span class="info-tel">${esc(rep.전화번호)}</span>`
              : `<span class="info-notel">연락처 없음</span>`}
            <span class="tag ${rep.거주구분==='거주'?'tag-res-y':'tag-res-n'}">${esc(rep.거주구분||'—')}</span>
          </div>
          <div class="divider"></div>
          <div class="consent-grid">
            <div class="c-col"><span class="c-lbl">사전</span>${cval(1)}</div>
            <div class="c-col"><span class="c-lbl">컨설팅</span>${cval(2)}</div>
            <div class="c-col"><span class="c-lbl">선도지구</span>${cval(3)}</div>
            <div class="c-col"><span class="c-lbl">주민대표단</span>${cval(4)}</div>
            <div class="c-col"><span class="c-lbl">입안제안</span>${cval(5)}</div>
            <div class="c-col"><span class="c-lbl">추진위원회</span>${cval(6)}</div>
          </div>
        </div>`;
    }).join('');

  } catch(e) {
    wrap.innerHTML = `<div class="empty-msg">오류: ${e.message}</div>`;
  }
}

async function openPopup(연번) {
  currentPopupYeonbun = 연번;
  document.getElementById('popup-title').textContent = `연번 ${연번}`;
  document.getElementById('popup-overlay').classList.add('show');

  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('on'));

  await loadPopupBasic(연번);
  loadPopupConsent(연번);
  loadPopupPay(연번);
  loadPopupAct(연번);
}

            ${addr ? `<span style="font-size:10px;font-weight:600;color:#1e3a5f;margin-left:6px">${esc(addr)}</span>` : ''}
          </div>
          <span style="font-size:10px;color:#888">${dt}</span>
        </div>
        <div>${esc(r['내용']||'')}</div>
        <span class="act-mini-result ${resultClass(r['결과'])}">${esc(r['결과'])}</span>
      </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
// TAB 2: 활동 기록
// ════════════════════════════════════════════════
async function loadActivityLog() {
  const wrap = document.getElementById('log-list');
  wrap.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span class="loading-txt">불러오는 중...</span></div>';

  const dateFrom = document.getElementById('act-date-from')?.value;
  const dateTo   = document.getElementById('act-date-to')?.value;

  let q = _supabase
    .from('activity_log')
    .select('연번, 부동산코드, 활동유형, 결과, 내용, 담당자, 활동일시')
    .eq('담당자', currentUser.name)
    .order('활동일시', { ascending: false })
    .limit(100);

  if (dateFrom) q = q.gte('활동일시', dateFrom + 'T00:00:00');
  if (dateTo)   q = q.lte('활동일시', dateTo   + 'T23:59:59');

  const { data: rows } = await q;

  if (!rows || rows.length === 0) {
    wrap.innerHTML = '<div class="empty-msg">활동 기록이 없습니다.</div>';
    return;
  }

  // 부동산코드 없는 기록은 연번으로 property 조회
  const noCodeRows = rows.filter(r => !r['부동산코드'] && r['연번']);
  const ynAddrMap = {};
  if (noCodeRows.length > 0) {
    const ynNums = [...new Set(noCodeRows.map(r => r['연번']))];
    for (let i = 0; i < ynNums.length; i += 100) {
      const chunk = ynNums.slice(i, i + 100);
      const { data: ypRows } = await _supabase
        .from('yeonbun_property').select('연번, 부동산코드').in('연번', chunk);
      const codes = (ypRows || []).map(r => r['부동산코드']);
      if (codes.length > 0) {
        const { data: pRows } = await _supabase
          .from('property').select('부동산코드, 동, 호').in('부동산코드', codes);
        const pMap = {};
        (pRows || []).forEach(p => { pMap[p['부동산코드']] = p; });
        (ypRows || []).forEach(r => {
          const p = pMap[r['부동산코드']];
          if (p && !ynAddrMap[r['연번']]) ynAddrMap[r['연번']] = `${p['동']}동 ${p['호']}호`;
        });
      }
    }
  }

  // 부동산코드 있는 기록은 property에서 동호수 직접 조회
  const pidSet = [...new Set(rows.filter(r => r['부동산코드']).map(r => r['부동산코드']))];
  const pidAddrMap = {};
  if (pidSet.length > 0) {
    const { data: pRows } = await _supabase
      .from('property').select('부동산코드, 동, 호').in('부동산코드', pidSet);
    (pRows || []).forEach(p => { pidAddrMap[p['부동산코드']] = `${p['동']}동 ${p['호']}호`; });
  }

  wrap.innerHTML = rows.map(r => {
    const dt = r['활동일시'] ? new Date(r['활동일시']).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '—';
    const pid = r['부동산코드'];
    const addr = pid ? pidAddrMap[pid] : ynAddrMap[r['연번']];
    const pidLabel = pid || `연번 ${r['연번']}`;
    return `
      <div class="act-card">
        <div class="act-top">
          <div class="act-left">
            <span class="act-type-badge">${esc(r['활동유형'])}</span>
            <span class="act-who">${esc(r['담당자']||'—')}</span>
          </div>
          <span class="act-time">${dt}</span>
        </div>
        <div class="act-target">
          <span style="font-weight:600;color:#1e3a5f">${esc(addr || pidLabel)}</span>
        </div>
        ${r['내용'] ? `<div class="act-content">${esc(r['내용'])}</div>` : ''}
        <span class="act-result ${resultClass(r['결과'])}">${esc(r['결과'])}</span>
      </div>`;
  }).join('');
}

// 팝업 활동기록 탭에서 바로 작성 (소유주 자동 선택)
async function openFormFromPopup(연번) {
  const { data: yoRows } = await _supabase
    .from('yeonbun_owner').select('부번, 대표소유주, owner:owner_id(id, 이름)').eq('연번', 연번);
  const all = yoRows || [];
  const rep = all.find(r => r['대표소유주']) || all.sort((a,b) => (a['부번']||0)-(b['부번']||0))[0];

  // 해당 연번에서 현재 보고 있는 팝업의 부동산코드 가져오기
  const { data: ypRow } = await _supabase
    .from('yeonbun_property').select('부동산코드').eq('연번', 연번).limit(1).single();
  const pid = ypRow?.부동산코드 || null;

  document.getElementById('popup-overlay').classList.remove('show');
  openForm();

  if (rep) {
    selectedOwner = { 연번, owner_id: rep.owner?.id, 이름: rep.owner?.이름||'—', 부동산코드: pid };
    const label = pid ? `${pid} · ${selectedOwner.이름}` : `연번 ${연번} · ${selectedOwner.이름}`;
    document.getElementById('owner-search').value = label;
    const box = document.getElementById('selected-owner-box');
    box.textContent = `선택됨: ${label}`;
    box.style.display = 'block';
  }
}

function resultClass(결과) {
  const m = {'제출완료':'res-submit','재연락필요':'res-retry','거부':'res-refuse','부재':'res-absent','기타':'res-etc'};
  return m[결과] || 'res-etc';
}

// ════════════════════════════════════════════════
// 새 활동 기록 작성
// ════════════════════════════════════════════════
let selectedActType = null;
let selectedResult  = null;
let selectedOwner   = null; // { 연번, owner_id, 이름 }

document.getElementById('new-btn').addEventListener('click', openForm);
document.getElementById('form-close').addEventListener('click', closeForm);

function openForm() {
  selectedActType = null; selectedResult = null; selectedOwner = null;
  document.querySelectorAll('.atype-btn').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('owner-search').value = '';
  document.getElementById('search-result').style.display = 'none';
  document.getElementById('search-result').innerHTML = '';
  document.getElementById('selected-owner-box').style.display = 'none';
  document.getElementById('memo-area').value = '';
  document.getElementById('auto-date').textContent = new Date().toLocaleDateString('ko-KR');
  document.getElementById('form-overlay').classList.add('show');
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('show');
}

document.querySelectorAll('.atype-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.atype-btn').forEach(b => b.classList.remove('sel'));
    this.classList.add('sel');
    selectedActType = this.dataset.val;
  });
});

document.querySelectorAll('.result-btn').forEach(btn => {
  btn.addEventListener('click', function () {
    document.querySelectorAll('.result-btn').forEach(b => b.classList.remove('sel'));
    this.classList.add('sel');
    selectedResult = this.dataset.val;
  });
});

// 소유주 검색
let searchTimer = null;
document.getElementById('owner-search').addEventListener('input', function () {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => searchOwner(this.value.trim()), 400);
});

async function searchOwner(q) {
  const resEl = document.getElementById('search-result');
  if (!q) { resEl.style.display = 'none'; return; }

  resEl.style.display = 'block';
  resEl.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:#888">검색 중...</div>';

  let rows = [];

  if (/^\d+$/.test(q)) {
    // 연번 검색 — 대표소유주 없으면 부번 최솟값 fallback
    const { data } = await _supabase
      .from('yeonbun_owner')
      .select('연번, 부번, 대표소유주, owner:owner_id(id, 이름, 전화번호)')
      .eq('연번', parseInt(q));
    const all = data || [];
    const rep = all.find(r => r['대표소유주']) || all.sort((a,b) => (a['부번']||0)-(b['부번']||0))[0];
    if (rep) {
      // 해당 연번의 첫 번째 부동산코드 조회
      const { data: ypRow } = await _supabase
        .from('yeonbun_property').select('부동산코드').eq('연번', parseInt(q)).limit(1).single();
      rows = [{ 연번: rep['연번'], owner_id: rep.owner?.id, 이름: rep.owner?.이름||'—', 전화번호: rep.owner?.전화번호||'', 부동산코드: ypRow?.부동산코드||null }];
    }
  } else {
    // 이름 검색
    const { data: oRows } = await _supabase
      .from('owner').select('id, 이름, 전화번호').ilike('이름', `%${q}%`).limit(10);

    if (oRows && oRows.length > 0) {
      const ownerIds = oRows.map(o => o.id);
      const { data: ynRows } = await _supabase
        .from('yeonbun_owner').select('연번, owner_id').in('owner_id', ownerIds).eq('대표소유주', true).limit(20);

      const ynOwnerMap = {};
      (ynRows || []).forEach(r => { ynOwnerMap[r['owner_id']] = r['연번']; });

      // 각 연번의 부동산코드 조회
      const ynNums = [...new Set(Object.values(ynOwnerMap))];
      const ynPidMap = {};
      if (ynNums.length > 0) {
        const { data: ypRows } = await _supabase
          .from('yeonbun_property').select('연번, 부동산코드').in('연번', ynNums);
        (ypRows || []).forEach(r => { if (!ynPidMap[r['연번']]) ynPidMap[r['연번']] = r['부동산코드']; });
      }

      rows = oRows
        .filter(o => ynOwnerMap[o.id])
        .map(o => ({
          연번: ynOwnerMap[o.id], owner_id: o.id, 이름: o.이름,
          전화번호: o.전화번호 || '', 부동산코드: ynPidMap[ynOwnerMap[o.id]] || null
        }));
    }
  }

  if (rows.length === 0) {
    resEl.innerHTML = '<div style="padding:8px 10px;font-size:11px;color:#888">검색 결과 없음</div>';
    return;
  }

  resEl.innerHTML = rows.map(r => `
    <div class="search-item" data-yn="${r.연번}" data-oid="${r.owner_id}" data-name="${esc(r.이름)}" data-pid="${r.부동산코드||''}">
      ${r.부동산코드 ? `<span style="font-weight:600">${esc(r.부동산코드)}</span> · ` : `연번 ${r.연번} · `}${esc(r.이름)} ${r.전화번호 ? '· '+esc(r.전화번호) : ''}
    </div>`).join('');

  resEl.querySelectorAll('.search-item').forEach(item => {
    item.addEventListener('click', function () {
      selectedOwner = {
        연번: parseInt(this.dataset.yn),
        owner_id: this.dataset.oid,
        이름: this.dataset.name,
        부동산코드: this.dataset.pid || null
      };
      const label = selectedOwner.부동산코드
        ? `${selectedOwner.부동산코드} · ${selectedOwner.이름}`
        : `연번 ${selectedOwner.연번} · ${selectedOwner.이름}`;
      document.getElementById('owner-search').value = label;
      const box = document.getElementById('selected-owner-box');
      box.textContent = `선택됨: ${label}`;
      box.style.display = 'block';
      resEl.style.display = 'none';
    });
  });
}

document.getElementById('submit-btn').addEventListener('click', async function () {
  if (!selectedActType) { alert('활동 유형을 선택해주세요.'); return; }
  if (!selectedOwner)   { alert('소유주를 선택해주세요.'); return; }
  if (!selectedResult)  { alert('결과를 선택해주세요.'); return; }

  this.disabled = true; this.textContent = '저장 중...';

  const { error } = await _supabase.from('activity_log').insert({
    연번: selectedOwner.연번,
    owner_id: selectedOwner.owner_id,
    부동산코드: selectedOwner.부동산코드 || null,
    활동유형: selectedActType,
    결과: selectedResult,
    내용: document.getElementById('memo-area').value.trim() || null,
    담당자: currentUser.name,
    활동일시: new Date().toISOString()
  });

  this.disabled = false; this.textContent = '작성 완료';

  if (error) { alert('저장 실패: ' + error.message); return; }

  closeForm();
  loadActivityLog();
});

// ════════════════════════════════════════════════
// 비밀번호 변경
// ════════════════════════════════════════════════
document.getElementById('pw-change-btn').addEventListener('click', () => {
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-confirm').value = '';
  const msg = document.getElementById('pw-msg');
  msg.className = 'pw-msg'; msg.textContent = '';
  document.getElementById('pw-modal-sub').textContent = currentUser?.name + ' 계정';
  document.getElementById('pw-modal-overlay').classList.add('show');
});

document.getElementById('pw-cancel').addEventListener('click', () => {
  document.getElementById('pw-modal-overlay').classList.remove('show');
});

document.getElementById('pw-save').addEventListener('click', async function () {
  const nw = document.getElementById('pw-new').value;
  const cf = document.getElementById('pw-confirm').value;
  const msg = document.getElementById('pw-msg');
  msg.className = 'pw-msg';

  if (nw.length < 8) { msg.className = 'pw-msg err'; msg.textContent = '비밀번호는 8자 이상이어야 합니다.'; return; }
  if (nw !== cf)     { msg.className = 'pw-msg err'; msg.textContent = '비밀번호가 일치하지 않습니다.'; return; }

  this.disabled = true;
  const { error } = await _supabase.auth.updateUser({ password: nw });
  this.disabled = false;

  if (error) { msg.className = 'pw-msg err'; msg.textContent = '변경 실패: ' + error.message; return; }
  msg.className = 'pw-msg ok'; msg.textContent = '비밀번호가 변경되었습니다.';
  setTimeout(() => document.getElementById('pw-modal-overlay').classList.remove('show'), 1500);
});
</script>
